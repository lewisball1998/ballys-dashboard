services:
  ballys-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ballys-dashboard:local
    container_name: ballys-dashboard
    restart: unless-stopped
    # Proper PID 1 / signal handling for clean shutdowns.
    init: true
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Bind the Next.js standalone server to all interfaces. Without this, Docker
      # sets HOSTNAME to the container id and the server never listens on a
      # reachable address (healthcheck + port mapping fail). PORT stays the
      # internal container port; map it on the host via `ports:` above.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      DATABASE_PATH: /app/data/ballys.db
      # Recovery escape hatch: bypass auth if locked out (CSRF still enforced).
      # AUTH_DISABLE: "1"
      # Required once module secrets land in v0.2 (optional/unused in v0.1).
      # Generate with:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
      # APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
    volumes:
      # Single persistent volume: SQLite DB + uploaded icons. THIS is your backup
      # target — preserve ./data to keep all settings, apps, sessions, and data.
      - ./data:/app/data
    # --- Hardening -----------------------------------------------------------
    # Runs non-root (see Dockerfile). Drop all Linux capabilities (the app needs
    # none: non-privileged port, file writes to the data volume only) and block
    # privilege escalation.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Writable scratch space without a writable rootfs.
    tmpfs:
      - /tmp
    # NOTE: a read_only root filesystem is intentionally NOT enabled. The Next.js
    # standalone server may write to .next/cache at runtime; enabling read_only
    # without the right tmpfs mounts can make the container brittle. Revisit with
    # explicit cache tmpfs after verification.
    #
    # --- v0.2: Docker Command Centre (OPT-IN, PRIVILEGED) --------------------
    # The dashboard can list and start/stop/restart containers. This requires the
    # Docker socket, which grants ROOT-EQUIVALENT control of the host — so it is
    # opt-in and OFF by default (ADR 0008 + docs/DOCKER.md). Until you enable it
    # the Docker page shows a clear "not configured" state.
    #
    # To enable, MERGE these into the `volumes:` / add the `group_add:` above
    # (a service can only have one `volumes:` key — append, don't duplicate it):
    #
    #   volumes:
    #     - ./data:/app/data
    #     # Read-only is enough for list + start/stop/restart (no socket writes).
    #     - /var/run/docker.sock:/var/run/docker.sock:ro
    #   group_add:
    #     # The container runs non-root with cap_drop: ALL; it must be in the
    #     # host's docker group to use the socket. Replace with your host's docker
    #     # GID (find it with:  getent group docker | cut -d: -f3 ).
    #     - "999"
