name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate DB migration (verify schema is migratable)
        run: pnpm db:generate

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: docker buildx build --load -t ballys-dashboard:ci .

      - name: Run container
        run: docker run -d --name bd -p 3000:3000 -e DATABASE_PATH=/app/data/ballys.db ballys-dashboard:ci

      - name: Smoke test readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health/ready; then echo "ready"; ok=1; break; fi
            sleep 2
          done
          if [ "${ok:-0}" != "1" ]; then echo "not ready"; docker logs bd; exit 1; fi
          curl -fsS http://127.0.0.1:3000/api/health

      - name: Stop container
        if: always()
        run: docker rm -f bd
